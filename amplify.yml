version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - pnpm install
            - pnpm --filter @gam/db generate
        build:
          commands:
            - pnpm --filter @gam/web build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: apps/web