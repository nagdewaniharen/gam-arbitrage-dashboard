version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - pnpm install
            - pnpm --filter @gam/db generate
            - pnpm --filter @gam/types build
            - pnpm --filter @gam/db build
        build:
          commands:
            - env | grep -e API_PROXY_URL >> apps/web/.env.production
            - pnpm --filter @gam/web build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: apps/web
