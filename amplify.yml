version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - pnpm install
            - pnpm --filter @gam/db generate
        build:
          commands:
            - pnpm --filter @gam/web build
            - cp -r .next/static .next/standalone/apps/web/.next/static
            - cp -r public .next/standalone/apps/web/public
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: apps/web