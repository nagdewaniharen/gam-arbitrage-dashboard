version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@9
            - pnpm install
            - pnpm --filter @gam/db generate
            - pnpm --filter @gam/types build
            - pnpm --filter @gam/db build
        build:
          commands:
            - env | grep -E '^(AUTH_SECRET|NEXTAUTH_SECRET|NEXTAUTH_URL|GOOGLE_OAUTH_CLIENT_ID|GOOGLE_OAUTH_CLIENT_SECRET|ALLOWED_GOOGLE_DOMAIN|BOOTSTRAP_ADMIN_EMAIL|DATABASE_URL)=' > .env.production || true
            - echo "--- .env.production var names (values hidden) ---"
            - cut -d= -f1 .env.production
            - pnpm --filter @gam/web build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: apps/web
