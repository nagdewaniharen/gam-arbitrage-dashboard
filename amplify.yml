version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npx pnpm install
            - npx pnpm --filter @gam/db generate
        build:
          commands:
            - npx turbo run build --filter=@gam/web
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: apps/web